<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Digital Folder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 20px;
    }

    h1 {
      color: #1a1a1a;
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 1rem;
    }

    .upload-section {
      margin-bottom: 50px;
      text-align: center;
    }

    .upload-area {
      background: white;
      border: 3px dashed #007bff;
      border-radius: 12px;
      padding: 40px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .upload-area:hover {
      background: #f8f9ff;
      border-color: #0056b3;
    }

    .upload-area.dragover {
      background: #e7f3ff;
      border-color: #0056b3;
      box-shadow: 0 0 10px rgba(0, 123, 255, 0.2);
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #333;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.9rem;
    }

    #fileInput {
      display: none;
    }

    .category-select {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      background: white;
    }

    .categories-section {
      margin-bottom: 50px;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .category-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .category-card:hover {
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .category-header {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .category-icon {
      font-size: 2rem;
    }

    .files-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .file-item:hover {
      background: #f0f2f5;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      color: #1a1a1a;
      font-weight: 500;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .file-date {
      color: #999;
      font-size: 0.85rem;
    }

    .file-actions {
      display: flex;
      gap: 8px;
      margin-left: 15px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-download {
      background: #007bff;
      color: white;
    }

    .btn-download:hover {
      background: #0056b3;
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0, 123, 255, 0.3);
    }

    .btn-delete {
      background: #ff6b6b;
      color: white;
    }

    .btn-delete:hover {
      background: #cc5555;
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(255, 107, 107, 0.3);
    }

    .empty-message {
      color: #999;
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    .loading {
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .categories-grid {
        grid-template-columns: 1fr;
      }

      .file-item {
        flex-wrap: wrap;
      }

      .file-actions {
        width: 100%;
        margin-left: 0;
        margin-top: 12px;
      }

      .btn {
        flex: 1;
        justify-content: center;
      }
    }

    .error {
      background: #ffe7e7;
      color: #d92c2c;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      border-left: 4px solid #d92c2c;
    }

    .success {
      background: #e7f5ee;
      color: #2d8659;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      border-left: 4px solid #2d8659;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 My Digital Folder</h1>
      <p class="subtitle">Store and manage your school files in one place</p>
    </header>

    <div id="message"></div>

    <div class="upload-section">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📤</div>
        <div class="upload-text">Click or drag files here to upload</div>
        <div class="upload-hint">Select a file from your device</div>
      </div>
      <input type="file" id="fileInput" accept="*">
      
      <select id="categorySelect" class="category-select">
        <option value="">Select a category...</option>
        <option value="Handouts">📂 Handouts</option>
        <option value="Projects">📝 Projects</option>
        <option value="Journals">📖 Journals</option>
      </select>
    </div>

    <div class="categories-section">
      <div id="categoriesContainer"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const categorySelect = document.getElementById('categorySelect');
    const messageDiv = document.getElementById('message');
    const categoriesContainer = document.getElementById('categoriesContainer');

    const categories = [
      { name: 'Handouts', icon: '📂' },
      { name: 'Projects', icon: '📝' },
      { name: 'Journals', icon: '📖' }
    ];

    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    function handleFileSelect(file) {
      const category = categorySelect.value;
      if (!category) {
        showMessage('Please select a category first', 'error');
        return;
      }

      uploadFile(file, category);
    }

    async function uploadFile(file, category) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('category', category);

      try {
        const response = await fetch(`${API_URL}/api/files/upload`, {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          showMessage('File uploaded successfully!', 'success');
          categorySelect.value = '';
          fileInput.value = '';
          loadFiles();
        } else {
          showMessage('Failed to upload file', 'error');
        }
      } catch (error) {
        console.error('Upload error:', error);
        showMessage('Error uploading file', 'error');
      }
    }

    async function loadFiles() {
      try {
        const response = await fetch(`${API_URL}/api/files`);
        if (!response.ok) throw new Error('Failed to load files');
        
        const files = await response.json();
        renderCategories(files);
      } catch (error) {
        console.error('Load error:', error);
        showMessage('Error loading files', 'error');
      }
    }

    function renderCategories(files) {
      categoriesContainer.innerHTML = '';

      const categoriesGrid = document.createElement('div');
      categoriesGrid.className = 'categories-grid';

      categories.forEach(category => {
        const categoryFiles = files.filter(f => f.category === category.name);
        
        const categoryCard = document.createElement('div');
        categoryCard.className = 'category-card';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <span class="category-icon">${category.icon}</span>
          <span>${category.name}</span>
        `;

        const filesList = document.createElement('div');
        filesList.className = 'files-list';

        if (categoryFiles.length === 0) {
          filesList.innerHTML = '<div class="empty-message">No files yet</div>';
        } else {
          categoryFiles.forEach(file => {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';

            const date = new Date(file.uploadedAt).toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            });

            fileItem.innerHTML = `
              <div class="file-info">
                <div class="file-name">📄 ${escapeHtml(file.originalName)}</div>
                <div class="file-date">${date}</div>
              </div>
              <div class="file-actions">
                <button class="btn btn-download" onclick="downloadFile(${file.id}, '${escapeHtml(file.originalName)}')">
                  ⬇️ Download
                </button>
                <button class="btn btn-delete" onclick="deleteFile(${file.id})">
                  🗑️ Delete
                </button>
              </div>
            `;

            filesList.appendChild(fileItem);
          });
        }

        categoryCard.appendChild(header);
        categoryCard.appendChild(filesList);
        categoriesGrid.appendChild(categoryCard);
      });

      categoriesContainer.appendChild(categoriesGrid);
    }

    async function downloadFile(id, fileName) {
      try {
        const response = await fetch(`${API_URL}/api/files/${id}/download`);
        if (!response.ok) throw new Error('Download failed');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } catch (error) {
        console.error('Download error:', error);
        showMessage('Error downloading file', 'error');
      }
    }

    async function deleteFile(id) {
      if (!confirm('Are you sure you want to delete this file?')) return;

      try {
        const response = await fetch(`${API_URL}/api/files/${id}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showMessage('File deleted successfully', 'success');
          loadFiles();
        } else {
          showMessage('Failed to delete file', 'error');
        }
      } catch (error) {
        console.error('Delete error:', error);
        showMessage('Error deleting file', 'error');
      }
    }

    function showMessage(text, type) {
      messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      setTimeout(() => {
        messageDiv.innerHTML = '';
      }, 4000);
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    loadFiles();
  </script>
</body>
</html>
